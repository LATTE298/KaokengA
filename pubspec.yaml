name: daily_life
description: "Daily Life (ชีวิตประจำวัน) - neuro-inclusive sandbox app for Thai children"
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.7.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # Game engine
  flame: ^1.22.0

  # State management (spec 13)
  flutter_riverpod: ^2.6.1

  # Data models (spec 06 §5)
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

  # Firebase (spec 12, spec 06 §4)
  # Storage (firebase_storage) requires the Blaze plan — omitted. Scenario
  # JSONs and images are bundled in /assets instead (spec 03 E-02 fallback).
  firebase_core: ^3.8.0
  firebase_auth: ^5.3.3
  cloud_firestore: ^5.5.0

  # Content + cache (spec 06 §6)
  flutter_cache_manager: ^3.4.1
  path_provider: ^2.1.5
  http: ^1.2.2

  # Design system (spec 10)
  google_fonts: ^6.2.1
  phosphor_flutter: ^2.1.0

  # Routing (spec 02)
  go_router: ^14.6.1

  # Utilities
  uuid: ^4.5.1
  crypto: ^3.0.6
  just_audio: ^0.10.5

  # TTS ในเครื่อง (engine ของ Android/เบราว์เซอร์) — เครื่องเสียงสำรองเมื่อไม่มีคีย์
  # GOOGLE_TTS_API_KEY หรือ Cloud TTS ล้มเหลว (เช่น ออฟไลน์) แอปจะได้ไม่เงียบสนิท
  flutter_tts: ^4.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

  # Codegen for freezed + riverpod + json_serializable
  build_runner: ^2.4.13
  freezed: ^2.5.7
  json_serializable: ^6.8.0

flutter:
  uses-material-design: true
  # Sarabun font (spec 10) is loaded via google_fonts package — no asset bundling needed.

  assets:
    - assets/scenarios/
    - assets/images/
    - assets/memory_packs/
    - assets/vocabulary/
    - assets/tts/
