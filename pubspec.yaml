name: daily_life
description: "Daily Life (ชีวิตประจำวัน) - neuro-inclusive sandbox app for Thai children"
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.7.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # Game engine
  flame: ^1.22.0

  # State management (spec 13)
  flutter_riverpod: ^2.6.1

  # Data models (spec 06 §5)
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

  # Firebase (spec 12, spec 06 §4)
  # Storage (firebase_storage) requires the Blaze plan — omitted. Scenario
  # JSONs and images are bundled in /assets instead (spec 03 E-02 fallback).
  firebase_core: ^3.8.0
  firebase_auth: ^5.3.3
  cloud_firestore: ^5.5.0

  # Google Sign-In สำหรับผู้ปกครอง (6.x — API signIn() เข้ากับ firebase_auth 5.x)
  google_sign_in: ^6.2.1

  # Content + cache (spec 06 §6)
  flutter_cache_manager: ^3.4.1
  path_provider: ^2.1.5
  http: ^1.2.2

  # Design system (spec 10)
  google_fonts: ^6.2.1
  phosphor_flutter: ^2.1.0

  # Routing (spec 02)
  go_router: ^14.6.1

  # Utilities
  uuid: ^4.5.1
  crypto: ^3.0.6
  just_audio: ^0.10.5

  # TTS ในเครื่อง (engine ของ Android/เบราว์เซอร์) — เครื่องเสียงสำรองเมื่อไม่มีคีย์
  # GOOGLE_TTS_API_KEY หรือ Cloud TTS ล้มเหลว (เช่น ออฟไลน์) แอปจะได้ไม่เงียบสนิท
  flutter_tts: ^4.2.0

  # เกมหมวดครอบครัว (เฟส 2.1) — คลังคำคัสตอมของผู้ปกครองเก็บ offline ในเครื่อง
  # Hive = local NoSQL cross-platform (Android+web) เก็บ bytes ได้ · image_picker
  # เลือกรูปจากแกลเลอรี/กล้อง · image = resize รูปก่อนเก็บ (คุมขนาด box)
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  image_picker: ^1.1.2
  image: ^4.3.0
  video_player: ^2.12.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

  # Codegen for freezed + riverpod + json_serializable
  build_runner: ^2.4.13
  freezed: ^2.5.7
  json_serializable: ^6.8.0

  # สร้างไอคอนแอปจากรูปเดียว (Kaokeng_ปก) — รัน: dart run flutter_launcher_icons
  flutter_launcher_icons: ^0.14.4

# ไอคอนแอป: ใช้ปก Kaokeng (3000x3000 สี่เหลี่ยมจัตุรัส) + adaptive icon พื้นครีม
flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/images/home_cover.png"
  min_sdk_android: 23
  adaptive_icon_background: "#FBF3E4"
  adaptive_icon_foreground: "assets/images/home_cover.png"

flutter:
  uses-material-design: true
  # Sarabun font (spec 10) is loaded via google_fonts package — no asset bundling needed.

  assets:
    - assets/scenarios/
    - assets/images/
    - assets/images/vocab/
    - assets/vocabulary/
    - assets/tts/
    - assets/sfx/
    - assets/video/
